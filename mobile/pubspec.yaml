name: paylo
description: Paylo — bonus wallet for customers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # State management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Routing
  go_router: ^13.0.0

  # JSON serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # QR
  qr_flutter: ^4.1.0
  barcode_widget: ^2.0.4

  # Push notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.4

  # UI / utilities
  google_fonts: ^6.1.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Forms validation
  formz: ^0.6.1

  # Device info
  device_info_plus: ^9.1.1
  package_info_plus: ^5.0.1

  # Connectivity
  connectivity_plus: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code generation
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.0
  riverpod_lint: ^2.3.7

  # Testing
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/

  # Fonts buradan əlavə oluna bilər; hələ Google Fonts istifadə edirik
